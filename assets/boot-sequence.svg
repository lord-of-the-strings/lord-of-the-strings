<svg viewBox="0 0 640 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="bglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="48%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#39FF14" stop-opacity="0.20"/>
      <stop offset="52%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
    </linearGradient>
    <style>
      .bg    { fill:#0f0f1a; }
      .card  { fill:#16161e; stroke:#2a2e42; stroke-width:1.5; }
      .ln    { font-family:'JetBrains Mono','Courier New',monospace; font-size:14.5px; fill:#c0caf5; opacity:0; }
      .ok    { fill:#39FF14; }
      .fail  { fill:#f7768e; }
      .ttl   { font-family:'JetBrains Mono','Courier New',monospace; font-size:15px; fill:#7aa2f7; font-weight:bold; }
    </style>
  </defs>

  <rect class="bg" width="640" height="400" rx="18"/>
  <rect class="card" x="8" y="8" width="624" height="384" rx="16"/>
  <text x="28" y="38" class="ttl">$ systemctl boot lord-of-the-strings.service</text>
  <line x1="28" y1="50" x2="612" y2="50" stroke="#2a2e42" stroke-width="1"/>

  <g filter="url(#bglow)">
    <text x="28" y="80"  class="ln"><tspan class="ok">[ok]</tspan> loading kernel module: string_theory.ko
      <animate attributeName="opacity" from="0" to="1" begin="0.2s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="108" class="ln"><tspan class="ok">[ok]</tspan> mounting /dev/creativity
      <animate attributeName="opacity" from="0" to="1" begin="0.7s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="136" class="ln"><tspan class="ok">[ok]</tspan> starting service: caffeine.service
      <animate attributeName="opacity" from="0" to="1" begin="1.2s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="164" class="ln"><tspan class="ok">[ok]</tspan> checking memory integrity — corruption diagnostics ready
      <animate attributeName="opacity" from="0" to="1" begin="1.7s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="192" class="ln"><tspan class="ok">[ok]</tspan> initializing hyprland compositor
      <animate attributeName="opacity" from="0" to="1" begin="2.2s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="220" class="ln"><tspan class="ok">[ok]</tspan> applying theme: tokyo-night-neon
      <animate attributeName="opacity" from="0" to="1" begin="2.7s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="248" class="ln"><tspan class="ok">[ok]</tspan> arch linux detected — as expected
      <animate attributeName="opacity" from="0" to="1" begin="3.2s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="276" class="ln"><tspan class="fail">[retry]</tspan> attempting to sleep before 2am
      <animate attributeName="opacity" from="0" to="1" begin="3.7s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="304" class="ln"><tspan class="ok">[ok]</tspan> loading personality module: lord-of-the-strings
      <animate attributeName="opacity" from="0" to="1" begin="4.2s"  dur="0.4s" fill="freeze"/></text>

    <text x="28" y="332" class="ln" font-weight="bold"><tspan class="ok">[ok]</tspan> system ready.
      <animate attributeName="opacity" from="0" to="1" begin="4.8s"  dur="0.4s" fill="freeze"/></text>
  </g>

  <rect x="28" y="322" width="9" height="16" fill="#39FF14" filter="url(#bglow)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="5.2s" dur="0.01s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" begin="5.2s" dur="1s" repeatCount="indefinite"/>
    <animate attributeName="x" from="200" to="200" begin="5.2s" dur="0.01s" fill="freeze"/>
  </rect>

  <rect x="8" y="8" width="624" height="384" rx="16" fill="url(#scan)">
    <animateTransform attributeName="transform" type="translate" values="0 -400; 0 400" dur="4.5s" repeatCount="indefinite"/>
  </rect>
</svg>
