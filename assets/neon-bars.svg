<svg viewBox="0 0 640 720" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="chase" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="45%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="50%" stop-color="#c8ffb0" stop-opacity="1"/>
      <stop offset="55%" stop-color="#39FF14" stop-opacity="0"/>
      <stop offset="100%" stop-color="#39FF14" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1 0; 1 0; -1 0" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>

    <style>
      .bg   { fill:#1a1b26; }
      .card { fill:#16161e; stroke:#2a2e42; stroke-width:1.5; rx:14; }
      .lbl  { font-family:'JetBrains Mono','Courier New',monospace; fill:#c0caf5; font-size:15px; }
      .pct  { font-family:'JetBrains Mono','Courier New',monospace; fill:#9ece6a; font-size:13px; }
      .ttl  { font-family:'JetBrains Mono','Courier New',monospace; fill:#7aa2f7; font-size:19px; font-weight:bold; }
      .note { font-family:'JetBrains Mono','Courier New',monospace; fill:#565f89; font-size:13px; }
      .trk  { fill:#232336; }
    </style>
  </defs>

  <rect class="bg" width="640" height="720" rx="18"/>
  <rect class="card" x="8" y="8" width="624" height="704" rx="16"/>

  <text x="32" y="46" class="ttl">$ cat ~/skills.log --tier=all</text>
  <line x1="32" y1="58" x2="608" y2="58" stroke="#2a2e42" stroke-width="1"/>

  <!-- C — expert -->
  <text x="32" y="92" class="lbl">c</text>
  <rect x="170" y="78" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="78" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="394" dur="1.6s" fill="freeze" begin="0.10s"/>
  </rect>
  <rect x="170" y="78" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- Java — expert -->
  <text x="32" y="132" class="lbl">java</text>
  <rect x="170" y="118" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="118" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="377" dur="1.6s" fill="freeze" begin="0.22s"/>
  </rect>
  <rect x="170" y="118" width="410" height="16" rx="8" fill="url(#chase)"/>


  <!-- Python — expert -->
  <text x="32" y="172" class="lbl">python</text>
  <rect x="170" y="158" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="158" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="385" dur="1.6s" fill="freeze" begin="0.34s"/>
  </rect>
  <rect x="170" y="158" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- Flask — expert -->
  <text x="32" y="212" class="lbl">flask</text>
  <rect x="170" y="198" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="198" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="361" dur="1.6s" fill="freeze" begin="0.46s"/>
  </rect>
  <rect x="170" y="198" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- Linux (Arch) — expert -->
  <text x="32" y="252" class="lbl">linux (arch, daily)</text>
  <rect x="170" y="238" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="238" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="398" dur="1.6s" fill="freeze" begin="0.58s"/>
  </rect>
  <rect x="170" y="238" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- HTML/CSS — knower -->
  <text x="32" y="292" class="lbl">html / css</text>
  <rect x="170" y="278" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="278" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="238" dur="1.6s" fill="freeze" begin="0.70s"/>
  </rect>
  <rect x="170" y="278" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- C++ — learner -->
  <text x="32" y="332" class="lbl">c++</text>
  <rect x="170" y="318" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="318" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="172" dur="1.6s" fill="freeze" begin="0.82s"/>
  </rect>
  <rect x="170" y="318" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- FastAPI — learner -->
  <text x="32" y="372" class="lbl">fastapi</text>
  <rect x="170" y="358" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="358" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="164" dur="1.6s" fill="freeze" begin="0.94s"/>
  </rect>
  <rect x="170" y="358" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- Spring Boot — learner -->
  <text x="32" y="412" class="lbl">spring boot</text>
  <rect x="170" y="398" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="398" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="156" dur="1.6s" fill="freeze" begin="1.06s"/>
  </rect>
  <rect x="170" y="398" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- Docker — learner -->
  <text x="32" y="452" class="lbl">docker</text>
  <rect x="170" y="438" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="438" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="148" dur="1.6s" fill="freeze" begin="1.18s"/>
  </rect>
  <rect x="170" y="438" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- ML — learner -->
  <text x="32" y="492" class="lbl">machine learning</text>
  <rect x="170" y="478" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="478" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="139" dur="1.6s" fill="freeze" begin="1.30s"/>
  </rect>
  <rect x="170" y="478" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- Django — beginner -->
  <text x="32" y="532" class="lbl">django</text>
  <rect x="170" y="518" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="518" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="115" dur="1.6s" fill="freeze" begin="1.42s"/>
  </rect>
  <rect x="170" y="518" width="410" height="16" rx="8" fill="url(#chase)"/>

  <!-- Rust — beginner -->
  <text x="32" y="572" class="lbl">rust</text>
  <rect x="170" y="558" width="410" height="16" rx="8" class="trk"/>
  <rect x="170" y="558" height="16" rx="8" fill="#39FF14" filter="url(#glow)" opacity="0.9">
    <animate attributeName="width" from="0" to="90" dur="1.6s" fill="freeze" begin="1.54s"/>
  </rect>
  <rect x="170" y="558" width="410" height="16" rx="8" fill="url(#chase)"/>

  <line x1="32" y1="602" x2="608" y2="602" stroke="#2a2e42" stroke-width="1"/>
  <text x="32" y="628" class="note">special ops: manual memory management &amp; corruption diagnostics, in C</text>
  <text x="32" y="650" class="note">standing directive: constant exploration of uncharted domains</text>

  <circle cx="600" cy="645" r="5" fill="#39FF14" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.25;1" dur="1.4s" repeatCount="indefinite"/>
  </circle>
</svg>
